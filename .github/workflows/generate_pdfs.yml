name: Generate PDF

on:
  push:

jobs:
  run-tectonic:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Tectonic cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/Tectonic
          key: ${{ runner.os }}-tectonic-${{ hashFiles('**/*.tex') }}
          restore-keys: |
            ${{ runner.os }}-tectonic-

      - name: Install tectonic
        uses: wtfjoke/setup-tectonic@v4

      - name: Run tectonic
        run: tectonic -X build

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: pdf
          path: build/default/default.pdf

      - name: Upload Pages artifact
        id: deployment
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/default

      - name: Prepare PDF for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp build/default/default.pdf BUM-Standard.pdf

      - name: Release PDF
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: BUM-Standard.pdf

  deploy-pages:
    needs: run-tectonic
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
